<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SH Project - Task Manager</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f9;
}

header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    display: flex;
    height: calc(100vh - 60px);
}

.sidebar {
    width: 220px;
    background: #34495e;
    color: white;
    padding: 20px;
}

.sidebar h2 {
    font-size: 18px;
}

.sidebar button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: #1abc9c;
    color: white;
    cursor: pointer;
}

.main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

input, select {
    padding: 8px;
    margin: 5px 0;
    width: 100%;
}

.task {
    background: white;
    padding: 15px;
    margin-top: 10px;
    border-left: 5px solid #3498db;
}

.task.done {
    border-left-color: #2ecc71;
    text-decoration: line-through;
}

.task.high { border-left-color: #e74c3c; }
.task.medium { border-left-color: #f39c12; }
.task.low { border-left-color: #3498db; }

button {
    margin-top: 5px;
    padding: 6px 10px;
    border: none;
    cursor: pointer;
}

.delete { background: #e74c3c; color: white; }
.complete { background: #2ecc71; color: white; }

.auth {
    max-width: 300px;
    margin: 100px auto;
    background: white;
    padding: 20px;
    border-radius: 5px;
}
</style>
</head>

<body>

<header>SH Project - Task Manager</header>

<div id="authSection" class="auth">
    <h3>Login</h3>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login / Signup</button>
</div>

<div id="app" style="display:none;">
    <div class="container">
        <div class="sidebar">
            <h2>Menu</h2>
            <button onclick="showAll()">All Tasks</button>
            <button onclick="filterStatus('todo')">To Do</button>
            <button onclick="filterStatus('in-progress')">In Progress</button>
            <button onclick="filterStatus('done')">Done</button>
            <button onclick="logout()">Logout</button>
        </div>

        <div class="main">
            <h2>Tasks</h2>

            <input id="taskTitle" placeholder="Task title">
            <input id="taskDate" type="date">
            <select id="taskPriority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <button onclick="addTask()">Add Task</button>

            <input id="search" placeholder="Search..." oninput="renderTasks()">

            <div id="taskList"></div>
        </div>
    </div>
</div>

<script>
let currentUser = null;
let tasks = [];
let filter = "all";

function login() {
    const user = document.getElementById("username").value;
    if (!user) return alert("Enter username");

    currentUser = user;
    localStorage.setItem("user", user);

    loadTasks();

    document.getElementById("authSection").style.display = "none";
    document.getElementById("app").style.display = "block";
}

function logout() {
    localStorage.removeItem("user");
    location.reload();
}

function loadTasks() {
    const saved = localStorage.getItem("tasks_" + currentUser);
    tasks = saved ? JSON.parse(saved) : [];
    renderTasks();
}

function saveTasks() {
    localStorage.setItem("tasks_" + currentUser, JSON.stringify(tasks));
}

function addTask() {
    const title = document.getElementById("taskTitle").value;
    const date = document.getElementById("taskDate").value;
    const priority = document.getElementById("taskPriority").value;

    if (!title) return;

    tasks.push({
        id: Date.now(),
        title,
        date,
        priority,
        status: "todo"
    });

    saveTasks();
    renderTasks();
}

function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    renderTasks();
}

function completeTask(id) {
    tasks = tasks.map(t => {
        if (t.id === id) t.status = "done";
        return t;
    });
    saveTasks();
    renderTasks();
}

function filterStatus(status) {
    filter = status;
    renderTasks();
}

function showAll() {
    filter = "all";
    renderTasks();
}

function renderTasks() {
    const list = document.getElementById("taskList");
    const search = document.getElementById("search").value.toLowerCase();

    list.innerHTML = "";

    tasks
        .filter(t => filter === "all" || t.status === filter)
        .filter(t => t.title.toLowerCase().includes(search))
        .forEach(t => {
            const div = document.createElement("div");
            div.className = `task ${t.status === "done" ? "done" : ""} ${t.priority}`;

            div.innerHTML = `
                <strong>${t.title}</strong><br>
                Due: ${t.date || "N/A"}<br>
                Priority: ${t.priority}<br>
                Status: ${t.status}<br>
                <button class="complete" onclick="completeTask(${t.id})">Done</button>
                <button class="delete" onclick="deleteTask(${t.id})">Delete</button>
            `;

            list.appendChild(div);
        });
}

window.onload = () => {
    const user = localStorage.getItem("user");
    if (user) {
        currentUser = user;
        document.getElementById("authSection").style.display = "none";
        document.getElementById("app").style.display = "block";
        loadTasks();
    }
};
</script>

</body>
</html>
