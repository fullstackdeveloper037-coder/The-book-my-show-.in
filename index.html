
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SH Project</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fb;
}

header {
    background: #1e293b;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.container {
    display: flex;
    height: calc(100vh - 60px);
}

.sidebar {
    width: 220px;
    background: #0f172a;
    color: white;
    padding: 20px;
}

.sidebar button {
    width: 100%;
    margin: 8px 0;
    padding: 10px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

.main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 15px;
}

input, select, textarea {
    width: 100%;
    padding: 8px;
    margin: 6px 0;
}

.task {
    padding: 12px;
    border-radius: 6px;
    margin-top: 10px;
    background: white;
    border-left: 6px solid #3b82f6;
}

.high { border-left-color: #ef4444; }
.medium { border-left-color: #f59e0b; }
.low { border-left-color: #3b82f6; }

.done {
    text-decoration: line-through;
    opacity: 0.6;
}

.btn {
    padding: 5px 10px;
    border: none;
    margin-top: 5px;
    cursor: pointer;
    border-radius: 4px;
}

.green { background: #22c55e; color: white; }
.red { background: #ef4444; color: white; }
.yellow { background: #eab308; }

.auth {
    max-width: 300px;
    margin: 100px auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
}
</style>
</head>

<body>

<header>SH Project - Productivity App</header>

<!-- LOGIN -->
<div id="auth" class="auth">
    <h3>Login / Signup</h3>
    <input id="user" placeholder="Username">
    <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<div class="container">

<div class="sidebar">
    <h3>Menu</h3>
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('todo')">To Do</button>
    <button onclick="setFilter('in-progress')">In Progress</button>
    <button onclick="setFilter('done')">Done</button>
    <button onclick="logout()">Logout</button>
</div>

<div class="main">

<div class="card">
    <h3>Add Task</h3>
    <input id="title" placeholder="Task title">
    <input id="date" type="date">
    <select id="priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>
    <textarea id="notes" placeholder="Notes"></textarea>
    <button class="btn green" onclick="addTask()">Add Task</button>
</div>

<input id="search" placeholder="Search..." oninput="render()">

<div id="tasks"></div>

</div>
</div>
</div>

<script>
let user = null;
let tasks = [];
let filter = "all";

function login() {
    user = document.getElementById("user").value;
    if (!user) return alert("Enter username");

    localStorage.setItem("user", user);
    load();
    showApp();
}

function logout() {
    localStorage.clear();
    location.reload();
}

function showApp() {
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
}

function load() {
    const data = localStorage.getItem("tasks_" + user);
    tasks = data ? JSON.parse(data) : [];
}

function save() {
    localStorage.setItem("tasks_" + user, JSON.stringify(tasks));
}

function addTask() {
    const title = document.getElementById("title").value;
    if (!title) return;

    tasks.push({
        id: Date.now(),
        title,
        date: document.getElementById("date").value,
        priority: document.getElementById("priority").value,
        notes: document.getElementById("notes").value,
        status: "todo"
    });

    save();
    render();
}

function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
}

function changeStatus(id) {
    tasks = tasks.map(t => {
        if (t.id === id) {
            if (t.status === "todo") t.status = "in-progress";
            else if (t.status === "in-progress") t.status = "done";
        }
        return t;
    });
    save();
    render();
}

function editTask(id) {
    const newTitle = prompt("Edit task:");
    if (!newTitle) return;

    tasks = tasks.map(t => {
        if (t.id === id) t.title = newTitle;
        return t;
    });

    save();
    render();
}

function setFilter(f) {
    filter = f;
    render();
}

function render() {
    const list = document.getElementById("tasks");
    const search = document.getElementById("search").value.toLowerCase();

    list.innerHTML = "";

    tasks
    .filter(t => filter === "all" || t.status === filter)
    .filter(t => t.title.toLowerCase().includes(search))
    .forEach(t => {

        const div = document.createElement("div");
        div.className = `task ${t.priority} ${t.status==="done"?"done":""}`;

        div.innerHTML = `
            <b>${t.title}</b><br>
             ${t.date || "No date"}<br>
             ${t.priority}<br>
             ${t.notes || "No notes"}<br>
             ${t.status}<br>

            <button class="btn yellow" onclick="changeStatus(${t.id})">Next</button>
            <button class="btn green" onclick="editTask(${t.id})">Edit</button>
            <button class="btn red" onclick="deleteTask(${t.id})">Delete</button>
        `;

        list.appendChild(div);
    });
}

window.onload = () => {
    const savedUser = localStorage.getItem("user");
    if (savedUser) {
        user = savedUser;
        showApp();
        load();
        render();
    }
};
</script>

</body>
</html>
